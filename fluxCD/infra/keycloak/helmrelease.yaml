apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: keycloak
  namespace: flux-system
spec:
  interval: 10m
  releaseName: keycloak
  targetNamespace: keycloak
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: keycloak
      version: "24.7.4"
      sourceRef:
        kind: HelmRepository
        name: keycloak
        namespace: flux-system
  values:
    auth:
      adminUser: admin
      adminPassword: admin
    service:
      type: ClusterIP
    ingress:
      enabled: true
      hostname: keycloak.home.lab
      annotations:
        cert-manager.io/cluster-issuer: local-cluster-issuer
        cert-manager.io/propagation-timeout: "30s"
        cert-manager.io/polling-interval: "5s"
      tls: true
      extraTls:
        - hosts:
            - keycloak.home.lab
          secretName: keycloak-tls
    postgresql:
      enabled: true
      auth:
        postgresPassword: keycloakpg
        password: keycloakpass
    keycloakConfigCli:
      enabled: true
      configuration:
        example-realm.json: |
          {
            "realm": "example-realm",
            "enabled": true,
            "registrationAllowed": true,
            "users": [
              {
                "username": "basicuser",
                "email": "basicuser@example.com",
                "enabled": true,
                "firstName": "Basic",
                "lastName": "User",
                "credentials": [
                  {
                    "type": "password",
                    "value": "basicpassword"
                  }
                ]
              }
            ],
            "groups": [
              {
                "name": "basicgroup"
              }
            ]
          }
