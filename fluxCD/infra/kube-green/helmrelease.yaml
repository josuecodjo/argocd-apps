apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-green
  namespace: flux-system
spec:
  interval: 10m
  releaseName: kube-green
  targetNamespace: kube-green
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: kube-green
      version: "0.6.0"
      sourceRef:
        kind: HelmRepository
        name: kube-green
        namespace: flux-system
  values: {}
