apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: policy-reporter
  namespace: flux-system
spec:
  interval: 10m
  releaseName: policy-reporter
  targetNamespace: policy-reporter
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: policy-reporter
      version: "3.7.4"
      sourceRef:
        kind: HelmRepository
        name: policy-reporter
        namespace: flux-system
  values:
    ui:
      enabled: true
      ingress:
        enabled: true
        className: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: local-cluster-issuer
          cert-manager.io/propagation-timeout: "30s"
          cert-manager.io/polling-interval: "5s"
        hosts:
          - host: kyverno.home.lab
            paths:
              - path: /
                pathType: Prefix
        tls:
          - secretName: kyverno-tls
            hosts:
              - kyverno.home.lab
    metrics:
      enabled: true
    plugin:
      kyverno:
        enabled: true
