apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: argo-rollouts
  namespace: flux-system
spec:
  interval: 10m
  releaseName: argo-rollouts
  targetNamespace: argo-rollouts
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: argo-rollouts
      version: "2.40.9"
      sourceRef:
        kind: HelmRepository
        name: argo-rollouts
        namespace: flux-system
  values:
    dashboard:
      enabled: true
      ingress:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: local-cluster-issuer
          cert-manager.io/propagation-timeout: "30s"
          cert-manager.io/polling-interval: "5s"
        hosts:
          - rollouts.home.lab
        paths:
          - /
        pathType: Prefix
        tls:
          - secretName: argo-rollouts-tls
            hosts:
              - rollouts.home.lab
    controller:
      metrics:
        enabled: true
