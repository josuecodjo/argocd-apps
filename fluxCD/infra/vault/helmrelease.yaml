# In the original repo this lived at base-apps/apps/vault.yaml -- a
# hand-written Application manifest that sat outside templates/, so it was
# never actually rendered/toggled by values.yaml. It's ported here on equal
# footing with everything else: present, disabled by default, one line away
# from being enabled in infra/kustomization.yaml.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: flux-system
spec:
  interval: 10m
  releaseName: vault
  targetNamespace: vault
  install:
    createNamespace: true
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  driftDetection:
    mode: enabled
  chart:
    spec:
      chart: vault
      version: "0.29.1"
      sourceRef:
        kind: HelmRepository
        name: vault
        namespace: flux-system
  values: {}
